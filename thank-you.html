<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Between</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5f3ee;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: #fff;
      border: 1px solid #e7e0d6;
      border-radius: 30px;
      padding: 48px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.06);
      text-align: center;
    }
    .eyebrow {
      font-size: 14px;
      color: #6f6a63;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(40px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.05em;
      margin: 0 0 18px;
    }
    p {
      font-size: 19px;
      line-height: 1.6;
      color: #5d5953;
      margin: 0 auto 28px;
      max-width: 560px;
    }
    .btn {
      display: inline-block;
      padding: 16px 24px;
      background: #111;
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
    }
    .tiny {
      margin-top: 18px;
      font-size: 14px;
      color: #7c766f;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Between</div>
    <h1>You’re in.</h1>
    <p>
      We received your connection gift request. Next, we’ll review the details and shape the experience from there.
    </p>
    <a href="/" class="btn">Back to homepage</a>
    <div class="tiny">This is still an early version, but now the flow is real.</div>
  </div>
</body>
</html>
